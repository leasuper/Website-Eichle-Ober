<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const SUITS  = ['Eichel','Schellen','Schilten','Rosen'];
const SUIT_EMOJI= { Eichel:'🌰', Schellen:'🔔', Schilten:'🛡️', Rosen:'🌹' };
const SUIT_FILE = { Eichel:'eichel', Schellen:'schelle', Schilten:'schilte', Rosen:'rose' };
const RANK_FILE = { '6':'6','7':'7','8':'8','9':'9','B':'10','U':'under','O':'ober','K':'koenig','A':'ass' };

const RANKS = ['6','7','8','9','B','U','O','K','A'];
const ri    = r => RANKS.indexOf(r);

const NUM_P  = 4;
const CPP    = 9; // cards per player
const NAMES  = ['Du','Hampi','Sepp','Ueli'];

const ROUNDS = [
  { name:'Stiche',        icon:'🃏', short:'+5/Stich',
    desc:'Möglichst wenig Stiche machen – jeder Stich kostet +5 Punkte' },
  { name:'Schilten',      icon:'🛡', short:'+10/Schilte',
    desc:'Keine Schiltenkarten gewinnen – jede Schilte: +10 Punkte' },
  { name:'Könige',        icon:'👑', short:'+20/König',
    desc:'Keinen König gewinnen – jeder König: +20 Punkte' },
  { name:'Eichel Ober',   icon:'♣',  short:'+40 Eichel Ober',
    desc:'Den Eichel Ober nicht machen – er kostet +40 Punkte' },
  { name:'Letzter Stich', icon:'⚡', short:'+50 Letzter',
    desc:'Den letzten Stich nicht machen – kostet +50 Punkte' },
  { name:'Alles!',        icon:'🌟', short:'Alle Regeln',
    desc:'Alles zählt gleichzeitig: +5/Stich · +10/Schilte · +20/König · +40 Eichel Ober · +50 Letzter' },
];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const createDeck = () => SUITS.flatMap(s => RANKS.map(r => ({suit:s,rank:r,id:`${s}-${r}`})));
const shuffle = a => { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; };
const sortHand = h => [...h].sort((a,b)=>{ const d=SUITS.indexOf(a.suit)-SUITS.indexOf(b.suit); return d||ri(a.rank)-ri(b.rank); });
function trickWinner(t) {
  const s=t[0].card.suit; let best=t[0];
  for(const p of t) if(p.card.suit===s && ri(p.card.rank)>ri(best.card.rank)) best=p;
  return best.player;
}
function calcScore(rndIdx, tw, lastW) {
  const r=n=>rndIdx===n||rndIdx===5;
  return Array.from({length:NUM_P},(_,p)=>{
    const mt=tw[p]||[], mc=mt.flat(); let s=0;
    if(r(0)) s+=mt.length*5;
    if(r(1)) s+=mc.filter(c=>c.suit==='Schilten').length*10;
    if(r(2)) s+=mc.filter(c=>c.rank==='K').length*20;
    if(r(3)&&mc.some(c=>c.suit==='Eichel'&&c.rank==='O')) s+=40;
    if(r(4)&&p===lastW) s+=50;
    return s;
  });
}

// ── AI ───────────────────────────────────────────────────────────────────────
function cardDanger(card, rndIdx) {
  const r=n=>rndIdx===n||rndIdx===5;
  let v=0;
  if(r(1)&&card.suit==='Schilten') v+=10;
  if(r(2)&&card.rank==='K') v+=20;
  if(r(3)&&card.suit==='Eichel'&&card.rank==='O') v+=40;
  return v;
}
function aiPlay(hand, trick, rndIdx, tricksDone) {
  let ok=hand;
  if(trick.length>0){ const ls=trick[0].card.suit, has=hand.filter(c=>c.suit===ls); if(has.length) ok=has; }
  const byR=cs=>[...cs].sort((a,b)=>ri(a.rank)-ri(b.rank));
  const isLast=tricksDone===CPP-1;

  if(trick.length>0){
    const ls=trick[0].card.suit; let best=trick[0];
    for(const p of trick) if(p.card.suit===ls&&ri(p.card.rank)>ri(best.card.rank)) best=p;
    const losing=ok.filter(c=>c.suit!==ls||ri(c.rank)<ri(best.card.rank));
    if(losing.length>0){
      // Dump most dangerous losing card
      return [...losing].sort((a,b)=>cardDanger(b,rndIdx)-cardDanger(a,rndIdx))[0];
    }
    // Must win – play lowest
    if(rndIdx===4&&isLast) return byR(ok)[ok.length-1]; // last trick – win big
    return byR(ok)[0];
  }
  // Leading
  if((rndIdx===3||rndIdx===5)&&ok.length>1){
    const eo=ok.find(c=>c.suit==='Eichel'&&c.rank==='O');
    if(eo) return eo; // dump Eichel Ober as lead
  }
  if(rndIdx===4&&isLast) return byR(ok)[ok.length-1];
  return byR(ok)[0]; // play lowest
}

// ── CARD ─────────────────────────────────────────────────────────────────────
function CardView({card, size='md', anim=false, special=false}) {
  const w = {sm:46, md:62, lg:76}[size]||62;
  const isEO = card.suit==='Eichel'&&card.rank==='O';
  const src = `CH-Jasskartenset/${SUIT_FILE[card.suit]}_${RANK_FILE[card.rank]}.png`;
  const shadow = isEO&&special
    ? '0 0 0 2px #D4A010, 0 4px 14px rgba(0,0,0,.35)'
    : '0 3px 10px rgba(0,0,0,.25)';
  return(
    <div className={anim?'slide-in':''} style={{display:'inline-block',position:'relative',userSelect:'none',flexShrink:0}}>
      <img src={src} alt={`${card.suit} ${card.rank}`}
        style={{width:w,height:'auto',display:'block',borderRadius:9,boxShadow:shadow}}
        draggable="false"
      />
      {isEO&&special&&<div style={{position:'absolute',top:-6,right:-6,background:'#D4A010',borderRadius:'50%',width:16,height:16,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',fontWeight:700,boxShadow:'0 2px 6px rgba(0,0,0,.3)'}}>★</div>}
    </div>
  );
}
function CardBack({w=20,h=30}){
  return(
    <div style={{width:w,height:h,borderRadius:4,background:'linear-gradient(135deg,#1a4d1a,#4a9e4a)',border:'1px solid rgba(255,255,255,.18)',flexShrink:0}}/>
  );
}

// ── TABLE STYLES (shared) ─────────────────────────────────────────────────────
const TH={padding:'9px 14px',fontWeight:700,color:'#2d6a2d',textAlign:'center',borderBottom:'2px solid #c5dfc0',fontSize:'0.84rem',background:'#f4f9f2'};
const TD={padding:'9px 12px',textAlign:'center',borderBottom:'1px solid #f0f0f0',fontSize:'0.88rem'};

// ── MAIN GAME ────────────────────────────────────────────────────────────────
function JassGame(){
  const init=()=>({
    phase:'intro',
    rndIdx:0,
    hands:[[],[],[],[]],
    trick:[],
    tricksDone:0,
    tricksWon:[[],[],[],[]],
    lastW:0,
    totals:[0,0,0,0],
    history:[],
    lead:0, cur:0,
    trickRes:null,
    rndRes:null,
  });

  const [G,setG]=useState(init());
  const tmr=useRef(null);

  const deal=(base,rndIdx)=>{
    const deck=shuffle(createDeck());
    const hands=Array.from({length:NUM_P},(_,i)=>sortHand(deck.slice(i*CPP,(i+1)*CPP)));
    const lp=base.lead??0;
    return{...base,phase:'playing',rndIdx,hands,trick:[],tricksDone:0,tricksWon:[[],[],[],[]],lastW:lp,lead:lp,cur:lp,trickRes:null,rndRes:null};
  };

  const startGame=()=>setG(deal({...init(),totals:[0,0,0,0],history:[],lead:0},0));

  const playCard=useCallback((pi,card)=>{
    setG(prev=>{
      if(prev.phase!=='playing'||prev.cur!==pi) return prev;
      // Follow-suit check
      if(prev.trick.length>0){
        const ls=prev.trick[0].card.suit;
        if(prev.hands[pi].some(c=>c.suit===ls)&&card.suit!==ls) return prev;
      }
      const newTrick=[...prev.trick,{player:pi,card}];
      const newHands=prev.hands.map((h,i)=>i===pi?h.filter(c=>c.id!==card.id):h);

      if(newTrick.length===NUM_P){
        const w=trickWinner(newTrick);
        const cards=newTrick.map(p=>p.card);
        const tw=prev.tricksWon.map((t,i)=>i===w?[...t,cards]:t);
        return{...prev,hands:newHands,trick:newTrick,phase:'trick_result',
          trickRes:{w,cards},tricksWon:tw,tricksDone:prev.tricksDone+1,lastW:w};
      }
      return{...prev,hands:newHands,trick:newTrick,cur:(pi+1)%NUM_P};
    });
  },[]);

  const advance=useCallback(()=>{
    setG(prev=>{
      if(prev.tricksDone>=CPP){
        const scores=calcScore(prev.rndIdx,prev.tricksWon,prev.lastW);
        const totals=prev.totals.map((t,i)=>t+scores[i]);
        return{...prev,phase:'round_result',history:[...prev.history,scores],totals,rndRes:{rndIdx:prev.rndIdx,scores}};
      }
      const n=prev.lastW;
      return{...prev,phase:'playing',trick:[],lead:n,cur:n,trickRes:null};
    });
  },[]);

  const nextRound=()=>{
    setG(prev=>{
      const n=prev.rndIdx+1;
      if(n>=ROUNDS.length) return{...prev,phase:'game_over'};
      return deal(prev,n);
    });
  };

  useEffect(()=>{
    clearTimeout(tmr.current);
    if(G.phase==='playing'&&G.cur!==0){
      tmr.current=setTimeout(()=>{
        const c=aiPlay(G.hands[G.cur],G.trick,G.rndIdx,G.tricksDone);
        if(c) playCard(G.cur,c);
      },500);
    }
    if(G.phase==='trick_result'){
      tmr.current=setTimeout(advance,1500);
    }
    return()=>clearTimeout(tmr.current);
  },[G.phase,G.cur,G.rndIdx,G.tricksDone]);

  const leadSuit=G.trick.length>0?G.trick[0].card.suit:null;
  const canPlay=card=>{
    if(G.cur!==0||G.phase!=='playing') return false;
    if(!leadSuit) return true;
    return G.hands[0].some(c=>c.suit===leadSuit)?card.suit===leadSuit:true;
  };
  const rnd=ROUNDS[G.rndIdx]||ROUNDS[0];
  const isLastTrick=G.tricksDone===CPP-1&&G.phase==='playing';
  const isLastTrickResult=G.tricksDone===CPP&&G.phase==='trick_result';

  // ── INTRO ──
  if(G.phase==='intro') return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
      <div className="fade-up" style={{background:'#fff',borderRadius:22,padding:'44px 40px',maxWidth:500,width:'100%',color:'#1a1a1a',boxShadow:'0 28px 72px rgba(0,0,0,.45)'}}>
        <a href="index.html" style={{fontSize:'.8rem',color:'#2d6a2d',textDecoration:'none',display:'block',marginBottom:18}}>← Zur Website</a>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:'3.2rem',marginBottom:6}}>🃏</div>
          <h1 style={{fontFamily:"'Libre Baskerville',serif",fontSize:'2rem',color:'#1a4d1a',marginBottom:6}}>Guggitaler</h1>
          <p style={{color:'#666',lineHeight:1.6,fontSize:'.9rem'}}>Du spielst gegen <strong>Hampi</strong>, <strong>Sepp</strong> und <strong>Ueli</strong>.<br/>Kein Trumpf · Farbzwang · <strong>Wer am wenigsten Punkte hat, gewinnt.</strong></p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:28}}>
          {ROUNDS.map((r,i)=>(
            <div key={i} style={{display:'flex',gap:12,alignItems:'center',background:i===5?'#fff8e8':'#f4f9f2',borderRadius:10,padding:'10px 14px',border:i===5?'1.5px solid #D4A010':'1px solid #e0eedd'}}>
              <div style={{width:30,height:30,background:i===5?'#D4A010':'#1a4d1a',color:'#fff',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.78rem',fontWeight:700,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:'.9rem',color:'#1a4d1a'}}>{r.name}</div>
                <div style={{fontSize:'.76rem',color:'#888',marginTop:1}}>{r.desc}</div>
              </div>
              <div style={{fontSize:'.72rem',fontWeight:700,color:'#c0392b',background:'#fdeaea',borderRadius:6,padding:'2px 8px',flexShrink:0}}>{r.short}</div>
            </div>
          ))}
        </div>
        <button className="btn-primary" onClick={startGame}
          style={{width:'100%',background:'#1a4d1a',color:'#fff',border:'none',borderRadius:12,padding:'15px',fontSize:'1rem',fontWeight:700,cursor:'pointer',letterSpacing:.3}}>
          Jetzt spielen →
        </button>
      </div>
    </div>
  );

  // ── GAME OVER ──
  if(G.phase==='game_over'){
    const sorted=NAMES.map((n,i)=>({n,i,s:G.totals[i]})).sort((a,b)=>a.s-b.s);
    const win=sorted[0];
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
        <div className="fade-up" style={{background:'#fff',borderRadius:22,padding:'40px 36px',maxWidth:720,width:'100%',color:'#1a1a1a',boxShadow:'0 28px 72px rgba(0,0,0,.45)'}}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{fontSize:'3rem',marginBottom:8}}>🏆</div>
            <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:'1.8rem',color:'#1a4d1a',marginBottom:6}}>Endresultat</h2>
            <p style={{fontSize:'1.1rem',color:'#555'}}>{win.n==='Du'?'🎉 Du gewinnst! Am wenigsten Strafpunkte!':` ${win.n} gewinnt mit den wenigsten Punkten!`}</p>
          </div>
          <div style={{overflowX:'auto',marginBottom:28}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr>
                  <th style={TH}>#</th>
                  <th style={TH}>Spieler</th>
                  {ROUNDS.map((r,i)=><th key={i} style={{...TH,fontSize:'.76rem'}}>{r.icon} {r.name}</th>)}
                  <th style={{...TH,color:'#c0392b'}}>Total</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((p,rank)=>(
                  <tr key={p.i} style={{background:p.i===0?'#eaf4e7':''}}>
                    <td style={{...TD,fontWeight:700}}>{rank+1}.</td>
                    <td style={{...TD,fontWeight:p.i===0?700:400}}>{p.n}</td>
                    {G.history.map((rs,ri2)=>(
                      <td key={ri2} style={{...TD,color:rs[p.i]>0?'#c0392b':rs[p.i]===0?'#999':'#2d6a2d',fontWeight:600}}>
                        {rs[p.i]>0?'+':''}{rs[p.i]}
                      </td>
                    ))}
                    <td style={{...TD,fontWeight:700,fontSize:'1.05rem',color:rank===0?'#2d6a2d':'#c0392b'}}>{p.s}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:'flex',gap:12}}>
            <button className="btn-primary" onClick={startGame}
              style={{flex:1,background:'#1a4d1a',color:'#fff',border:'none',borderRadius:12,padding:'13px',fontWeight:700,cursor:'pointer',fontSize:'.95rem'}}>
              Nochmals spielen
            </button>
            <a href="index.html"
              style={{flex:1,background:'#f4f4f4',color:'#555',borderRadius:12,padding:'13px',fontWeight:600,cursor:'pointer',fontSize:'.95rem',textDecoration:'none',textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center'}}>
              ← Zurück
            </a>
          </div>
        </div>
      </div>
    );
  }

  // ── ROUND RESULT ──
  if(G.phase==='round_result'&&G.rndRes){
    const next=G.rndIdx+1;
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
        <div className="fade-up" style={{background:'#fff',borderRadius:22,padding:'40px 36px',maxWidth:520,width:'100%',color:'#1a1a1a',boxShadow:'0 28px 72px rgba(0,0,0,.45)'}}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{fontSize:'2.5rem',marginBottom:8}}>{rnd.icon}</div>
            <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:'1.6rem',color:'#1a4d1a'}}>Spiel {G.rndIdx+1}: {rnd.name}</h2>
            <p style={{color:'#888',fontSize:'.84rem',marginTop:6}}>{rnd.desc}</p>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',marginBottom:28}}>
            <thead>
              <tr>
                <th style={TH}>Spieler</th>
                <th style={TH}>Dieses Spiel</th>
                <th style={TH}>Total</th>
              </tr>
            </thead>
            <tbody>
              {NAMES.map((name,i)=>{
                const s=G.rndRes.scores[i];
                return(
                  <tr key={i} style={{background:i===0?'#eaf4e7':''}}>
                    <td style={{...TD,fontWeight:i===0?700:400}}>{name}</td>
                    <td style={{...TD,fontWeight:700,fontSize:'1.15rem',color:s>0?'#c0392b':s===0?'#999':'#2d6a2d'}}>{s>0?'+':''}{s}</td>
                    <td style={{...TD,fontWeight:600}}>{G.totals[i]}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <button className="btn-primary" onClick={nextRound}
            style={{width:'100%',background:'#1a4d1a',color:'#fff',border:'none',borderRadius:12,padding:'14px',fontWeight:700,cursor:'pointer',fontSize:'.95rem'}}>
            {next<ROUNDS.length ? `Weiter → Spiel ${next+1}: ${ROUNDS[next].name}` : 'Zum Endresultat →'}
          </button>
        </div>
      </div>
    );
  }

  // ── PLAYING / TRICK_RESULT ──
  const trickNum = Math.min(G.tricksDone+1, CPP);

  return(
    <div style={{maxWidth:960,margin:'0 auto',padding:'10px 12px 24px',minHeight:'100vh',display:'flex',flexDirection:'column',gap:10}}>

      {/* ── Top bar ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <a href="index.html" style={{color:'rgba(255,255,255,.55)',textDecoration:'none',fontSize:'.78rem'}}>← Zurück</a>
        <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:'1rem',color:'rgba(255,255,255,.8)'}}>Guggitaler</div>
        <div style={{fontSize:'.78rem',color:'rgba(255,255,255,.5)'}}>Spiel {G.rndIdx+1} / {ROUNDS.length}</div>
      </div>

      {/* ── Scores ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
        {NAMES.map((name,i)=>(
          <div key={i} style={{
            background:i===0?'rgba(255,255,255,.16)':'rgba(0,0,0,.22)',
            border:i===0?'1px solid rgba(255,255,255,.3)':'1px solid transparent',
            borderRadius:10,padding:'7px 4px',textAlign:'center',
          }}>
            <div style={{fontSize:'.68rem',color:'#a8d5a2',marginBottom:2,letterSpacing:.3}}>{name}</div>
            <div style={{fontSize:'1.5rem',fontWeight:700,lineHeight:1}}>{G.totals[i]}</div>
            <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.35)',marginTop:2}}>{G.hands[i].length} Karten</div>
          </div>
        ))}
      </div>

      {/* ── Round info ── */}
      <div style={{background:G.rndIdx===5?'rgba(212,160,16,.18)':'rgba(255,255,255,.07)',borderRadius:10,padding:'9px 14px',display:'flex',alignItems:'center',gap:10,border:G.rndIdx===5?'1px solid rgba(212,160,16,.4)':'none'}}>
        <span style={{fontSize:'1.4rem'}}>{rnd.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:'.88rem'}}>{rnd.name}</div>
          <div style={{fontSize:'.74rem',color:'rgba(255,255,255,.6)',marginTop:1}}>{rnd.desc}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:'.72rem',color:'rgba(255,255,255,.45)'}}>Stich {trickNum}/9</div>
          {(isLastTrick||isLastTrickResult)&&<div style={{fontSize:'.72rem',color:'#e8c050',fontWeight:700,marginTop:2}}>⚡ Letzter!</div>}
        </div>
      </div>

      {/* ── AI hands ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
        {[1,2,3].map(pi=>(
          <div key={pi} style={{background:'rgba(0,0,0,.18)',borderRadius:10,padding:'9px 12px'}}>
            <div style={{fontSize:'.7rem',color:'#a8d5a2',marginBottom:6,display:'flex',alignItems:'center',gap:5}}>
              <span>{NAMES[pi]}</span>
              {G.cur===pi&&G.phase==='playing'&&<span style={{animation:'fadeUp .4s ease infinite alternate',opacity:.8}}>🤔</span>}
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:2.5}}>
              {G.hands[pi].map((_,ci)=><CardBack key={ci} w={17} h={26}/>)}
            </div>
          </div>
        ))}
      </div>

      {/* ── TABLE / TRICK AREA (BIG) ── */}
      <div style={{
        background:'radial-gradient(ellipse at center, #1d6b1d 0%, #0f420f 100%)',
        borderRadius:18,
        padding:'20px 24px 24px',
        flex:1,
        minHeight:200,
        border:'1px solid rgba(255,255,255,.08)',
        boxShadow:'inset 0 0 60px rgba(0,0,0,.3)',
        position:'relative',
      }}>
        {/* Felt texture overlay */}
        <div style={{position:'absolute',inset:0,borderRadius:18,background:'repeating-linear-gradient(45deg,rgba(0,0,0,.02) 0,rgba(0,0,0,.02) 1px,transparent 1px,transparent 8px)',pointerEvents:'none'}}/>

        <div style={{fontSize:'.68rem',color:'rgba(255,255,255,.3)',textTransform:'uppercase',letterSpacing:1.5,marginBottom:16,textAlign:'center'}}>
          Tisch
        </div>

        {/* Cards on table */}
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:20,flexWrap:'wrap',minHeight:120}}>
          {G.trick.map(({player,card},idx)=>{
            const isWinner=G.phase==='trick_result'&&G.trickRes?.w===player;
            const isEO=card.suit==='Eichel'&&card.rank==='O';
            return(
              <div key={player} style={{textAlign:'center',position:'relative'}}>
                <div style={{fontSize:'.72rem',color:'rgba(255,255,255,.55)',marginBottom:5,letterSpacing:.3}}>{NAMES[player]}</div>
                <div className={isWinner?'win-glow':''} style={{
                  transform:isWinner?'scale(1.08)':'scale(1)',
                  transition:'transform .25s',
                  filter:isWinner?'drop-shadow(0 0 12px rgba(212,200,80,.8))':'none',
                }}>
                  <CardView card={card} size="md" anim={true} special={true}/>
                </div>
                {isWinner&&<div style={{marginTop:5,fontSize:'.72rem',color:'#8be08b',fontWeight:700}}>✓ gewonnen</div>}
                {isEO&&!isWinner&&<div style={{marginTop:4,fontSize:'.68rem',color:'#D4A010',fontWeight:700}}>★ Eichel Ober</div>}
              </div>
            );
          })}

          {/* Empty slots */}
          {Array.from({length:NUM_P-G.trick.length},(_,i)=>(
            <div key={`e${i}`} style={{width:62,height:95,border:'2px dashed rgba(255,255,255,.1)',borderRadius:9}}/>
          ))}
        </div>

        {/* Trick result message */}
        {G.phase==='trick_result'&&G.trickRes&&(
          <div className="fade-up" style={{textAlign:'center',marginTop:16,fontSize:'1rem',color:'#a8e0a8',fontWeight:600}}>
            {NAMES[G.trickRes.w]} gewinnt den Stich
            {(G.trickRes.w!==undefined)&&G.rndIdx===3&&G.trick.some(p=>p.card.suit==='Eichel'&&p.card.rank==='O')
              ?<span style={{color:'#D4A010',marginLeft:6}}>+40 Pkt!</span>:''}
          </div>
        )}
      </div>

      {/* ── Player hand ── */}
      <div style={{background:'rgba(255,255,255,.06)',borderRadius:14,padding:'14px 16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{fontSize:'.7rem',color:'#a8d5a2',textTransform:'uppercase',letterSpacing:1}}>Deine Hand</div>
          {leadSuit&&(
            <div style={{
              display:'flex',alignItems:'center',gap:6,
              background:'rgba(255,255,255,.12)',borderRadius:20,
              padding:'3px 10px 3px 8px',
            }}>
              <span style={{fontSize:'.9rem'}}>{SUIT_EMOJI[leadSuit]}</span>
              <span style={{fontSize:'.72rem',fontWeight:700,color:'#fff'}}>{leadSuit} angespielt</span>
            </div>
          )}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
          {G.hands[0].map(card=>{
            const ok=canPlay(card);
            const isEO=card.suit==='Eichel'&&card.rank==='O';
            return(
              <div key={card.id}
                className={ok?'card-lift'+(isEO?' card-special':''):'card-dim'}
                onClick={()=>ok&&playCard(0,card)}
                title={isEO?'Achtung: Eichel Ober (+40 Pkt.!)':''}
              >
                <CardView card={card} size="lg" special={isEO}/>
              </div>
            );
          })}
        </div>
        {G.cur===0&&G.phase==='playing'&&(
          <div style={{marginTop:9,fontSize:'.75rem',color:'rgba(255,255,255,.4)'}}>
            {leadSuit?`Farbzwang: Du musst ${leadSuit} spielen (wenn vorhanden).`:'Du bist dran – wähle eine Karte.'}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<JassGame/>);
</script>
</body>
</html>
