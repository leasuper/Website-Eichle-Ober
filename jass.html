<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── FIREBASE ──────────────────────────────────────────────────────────────────
const db         = firebase.database();
const roomRef    = code => db.ref(`jass_rooms/${code}`);
const writeState = (code, g) => roomRef(code).child('stateJson').set(JSON.stringify(g));
const readHand   = async (code, seat) => {
  const snap = await roomRef(code).child(`handsJson/seat_${seat}`).once('value');
  return snap.val() ? JSON.parse(snap.val()) : [];
};
const writeHand = (code, seat, hand) =>
  roomRef(code).child(`handsJson/seat_${seat}`).set(JSON.stringify(hand));

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const SUITS      = ['Eichel','Schellen','Schilten','Rosen'];
const SUIT_EMOJI = { Eichel:'🌰', Schellen:'🔔', Schilten:'🛡️', Rosen:'🌹' };
const SUIT_FILE  = { Eichel:'eichel', Schellen:'schelle', Schilten:'schilte', Rosen:'rose' };
const RANK_FILE  = { '6':'6','7':'7','8':'8','9':'9','B':'10','U':'under','O':'ober','K':'koenig','A':'ass' };
const RANKS      = ['6','7','8','9','B','U','O','K','A'];
const ri         = r => RANKS.indexOf(r);
const AI_NAMES   = ['Roman','Mäggie','Cpt. Rotkopf','Claude','E.B03'];

const ROUNDS = [
  { name:'Stiche',        icon:'🃏', short:'+5/Stich',    desc:'Jeder Stich kostet +5 Punkte' },
  { name:'Schilten',      icon:'🛡', short:'+10/Schilte', desc:'Jede Schiltenkarte: +10 Punkte' },
  { name:'Könige',        icon:'👑', short:'+20/König',   desc:'Jeder König: +20 Punkte' },
  { name:'Eichel Ober',   icon:'♣',  short:'+40 EO',      desc:'Eichel Ober fangen: +40 Punkte' },
  { name:'Letzter Stich', icon:'⚡', short:'+50 Letzter', desc:'Letzter Stich: +50 Punkte' },
  { name:'Alles!',        icon:'🌟', short:'Alle Regeln', desc:'Alle Regeln gleichzeitig' },
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const cppForN = n => n === 6 ? 6 : n === 5 ? 7 : 9;

const nameFromEmail = email => {
  const part = email.split('@')[0].split('.')[0];
  return part.charAt(0).toUpperCase() + part.slice(1);
};
const randomCode = () =>
  Array.from({length:4}, () => 'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random()*23)]).join('');

const createDeck = numPlayers => {
  const full = SUITS.flatMap(s => RANKS.map(r => ({suit:s, rank:r, id:`${s}-${r}`})));
  if(numPlayers === 5) return full.filter(c => !(c.suit === 'Schellen' && c.rank === '7'));
  return full;
};
const shuffle  = a => { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; };
const sortHand = h => [...h].sort((a,b) => { const d=SUITS.indexOf(a.suit)-SUITS.indexOf(b.suit); return d||ri(a.rank)-ri(b.rank); });

const buildSeatNames = (myName, numPlayers) => {
  const names = [myName];
  for(let i = 1; i < numPlayers; i++) names.push(AI_NAMES[i-1]);
  return names;
};

function trickWinner(t) {
  const s = t[0].card.suit; let best = t[0];
  for(const p of t) if(p.card.suit===s && ri(p.card.rank)>ri(best.card.rank)) best=p;
  return best.player;
}

function calcScore(rndIdx, tw, lastW, numPlayers) {
  const r = n => rndIdx===n || rndIdx===5;
  return Array.from({length:numPlayers}, (_,p) => {
    const mt=tw[p]||[], mc=mt.flat(); let s=0;
    if(r(0)) s += mt.length*5;
    if(r(1)) s += mc.filter(c=>c.suit==='Schilten').length*10;
    if(r(2)) s += mc.filter(c=>c.rank==='K').length*20;
    if(mc.some(c=>c.suit==='Eichel'&&c.rank==='O')) s += r(3) ? 67 : 25;
    if(r(4) && p===lastW) s+=50;
    return s;
  });
}

// ── AI ────────────────────────────────────────────────────────────────────────
function cardDanger(card, rndIdx) {
  const r = n => rndIdx===n || rndIdx===5;
  let v = 0;
  if(r(1)&&card.suit==='Schilten') v+=10;
  if(r(2)&&card.rank==='K') v+=20;
  if(card.suit==='Eichel'&&card.rank==='O') v += r(3) ? 67 : 25;
  return v;
}
function aiPlay(hand, trick, rndIdx, tricksDone, cpp) {
  const C = cpp || 9;
  let ok = hand;
  if(trick.length>0){ const ls=trick[0].card.suit, has=hand.filter(c=>c.suit===ls); if(has.length) ok=has; }
  const byR = cs => [...cs].sort((a,b)=>ri(a.rank)-ri(b.rank));
  const isLast = tricksDone === C-1;
  if(trick.length>0){
    const ls=trick[0].card.suit; let best=trick[0];
    for(const p of trick) if(p.card.suit===ls&&ri(p.card.rank)>ri(best.card.rank)) best=p;
    const losing=ok.filter(c=>c.suit!==ls||ri(c.rank)<ri(best.card.rank));
    if(losing.length>0) return [...losing].sort((a,b)=>cardDanger(b,rndIdx)-cardDanger(a,rndIdx))[0];
    if(rndIdx===4&&isLast) return byR(ok)[ok.length-1];
    return byR(ok)[0];
  }
  if((rndIdx===3||rndIdx===5)&&ok.length>1){ const eo=ok.find(c=>c.suit==='Eichel'&&c.rank==='O'); if(eo) return eo; }
  if(rndIdx===4&&isLast) return byR(ok)[ok.length-1];
  return byR(ok)[0];
}

// ── PURE GAME LOGIC ───────────────────────────────────────────────────────────
function computeCardPlay(G, seat, card) {
  const NP = G.numPlayers || 4;
  const newTrick = [...G.trick, {player:seat, card}];
  const newHandSizes = [...G.handSizes];
  newHandSizes[seat]--;
  if(newTrick.length === NP){
    const w = trickWinner(newTrick);
    const cards = newTrick.map(p=>p.card);
    const newTricksWon = G.tricksWon.map((t,i)=>i===w?[...t,cards]:t);
    return {...G, trick:newTrick, handSizes:newHandSizes, phase:'trick_result',
      trickRes:{w,cards}, tricksWon:newTricksWon, tricksDone:G.tricksDone+1, lastW:w};
  }
  return {...G, trick:newTrick, handSizes:newHandSizes, cur:(seat+1)%NP};
}

async function hostDeal(roomCode, rndIdx, prevState, humanSeats, seatNames, numPlayers) {
  const NP  = numPlayers || 4;
  const CPP = cppForN(NP);
  const deck = shuffle(createDeck(NP));
  const hands = Array.from({length:NP}, (_,i)=>sortHand(deck.slice(i*CPP,(i+1)*CPP)));
  for(let s=0; s<NP; s++) await writeHand(roomCode, s, hands[s]);
  const lp = prevState?.lastW ?? 0;
  await writeState(roomCode, {
    phase:'playing', rndIdx, numPlayers:NP,
    trick:[], tricksDone:0,
    tricksWon: Array(NP).fill(null).map(()=>[]),
    lastW:lp, lead:lp, cur:lp,
    totals:  prevState?.totals  ?? Array(NP).fill(0),
    history: prevState?.history ?? [],
    trickRes:null, rndRes:null,
    handSizes: Array(NP).fill(CPP),
    humanSeats, seatNames,
  });
}

// ── CARD COMPONENTS ───────────────────────────────────────────────────────────
function CardView({card, size='md', special=false}) {
  const w = {sm:44, md:60, lg:74}[size]||60;
  const isEO = card.suit==='Eichel'&&card.rank==='O';
  const src = `img/CH-Jasskartenset/${SUIT_FILE[card.suit]}_${RANK_FILE[card.rank]}.png`;
  const shadow = isEO&&special ? '0 0 0 2px #D4A010, 0 4px 16px rgba(0,0,0,.45)' : '0 3px 10px rgba(0,0,0,.35)';
  return (
    <div style={{display:'inline-block',position:'relative',userSelect:'none',flexShrink:0}}>
      <img src={src} alt={`${card.suit} ${card.rank}`}
        style={{width:w,height:'auto',display:'block',borderRadius:8,boxShadow:shadow}}
        draggable="false"
      />
      {isEO&&special&&<div style={{position:'absolute',top:-5,right:-5,background:'#D4A010',borderRadius:'50%',width:15,height:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',fontWeight:700}}>★</div>}
    </div>
  );
}
function CardBack({w=17, h=26}) {
  return <div style={{width:w,height:h,borderRadius:3,flexShrink:0,background:'linear-gradient(135deg,#0e0a04 0%,#1c1408 55%,#0e0a04 100%)',border:'1px solid rgba(197,160,33,.22)',boxShadow:'inset 0 0 3px rgba(197,160,33,.08)'}}/>;
}

// ── LOBBY ─────────────────────────────────────────────────────────────────────
function Lobby({authUser, onJoined}) {
  const [codeInput,   setCodeInput]   = useState('');
  const [numPlayers,  setNumPlayers]  = useState(4);
  const [busy,        setBusy]        = useState(false);
  const [error,       setError]       = useState('');
  const myName = nameFromEmail(authUser.email);

  const createRoom = async () => {
    setBusy(true); setError('');
    const code = randomCode();
    const seatNames = buildSeatNames(myName, numPlayers);
    const init = {
      phase:'waiting', rndIdx:0, numPlayers,
      trick:[], tricksDone:0, tricksWon:Array(numPlayers).fill(null).map(()=>[]),
      lastW:0, lead:0, cur:0,
      totals:Array(numPlayers).fill(0), history:[],
      trickRes:null, rndRes:null,
      handSizes:Array(numPlayers).fill(0),
      humanSeats:[0], seatNames,
    };
    await roomRef(code).set({ stateJson:JSON.stringify(init), players:{[authUser.uid]:{name:myName,seat:0}} });
    localStorage.setItem('jass_room', code);
    onJoined(code, 0);
  };

  const joinRoom = async () => {
    if(!codeInput.trim()) return;
    setBusy(true); setError('');
    const code = codeInput.trim().toUpperCase();
    const snap = await roomRef(code).once('value');
    if(!snap.exists()) { setError('Raum nicht gefunden'); setBusy(false); return; }
    const players = snap.val().players || {};
    if(players[authUser.uid]) {
      localStorage.setItem('jass_room', code);
      onJoined(code, players[authUser.uid].seat);
      return;
    }
    const sSnap = await roomRef(code).child('stateJson').once('value');
    const st = sSnap.val() ? JSON.parse(sSnap.val()) : null;
    const maxSeats = st?.numPlayers || 4;
    const taken = Object.values(players).map(p=>p.seat);
    const seat  = Array.from({length:maxSeats},(_,i)=>i).find(s=>!taken.includes(s));
    if(seat===undefined) { setError('Raum ist voll'); setBusy(false); return; }
    await roomRef(code).child(`players/${authUser.uid}`).set({name:myName, seat});
    if(st){
      const newNames = [...(st.seatNames||[])]; newNames[seat]=myName;
      const newHuman = [...(st.humanSeats||[0])]; if(!newHuman.includes(seat)) newHuman.push(seat);
      await writeState(code, {...st, seatNames:newNames, humanSeats:newHuman});
    }
    localStorage.setItem('jass_room', code);
    onJoined(code, seat);
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
      <div className="dark-panel" style={{padding:32,maxWidth:360,width:'100%'}}>
        <a href="index.html" style={{color:'#777',textDecoration:'none',fontSize:'.78rem'}}>← Zurück</a>
        <h1 style={{fontSize:'1.5rem',fontWeight:700,margin:'14px 0 4px'}}>Grosse Gruusige</h1>
        <p style={{color:'#666',fontSize:'.8rem',marginBottom:22}}>Kein Trumpf · Farbzwang · Wer am wenigsten Punkte hat, gewinnt</p>

        <div style={{marginBottom:18}}>
          <div style={{fontSize:'.68rem',color:'#666',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Spieleranzahl</div>
          <div style={{display:'flex',gap:6}}>
            {[4,5,6].map(n=>(
              <button key={n} onClick={()=>setNumPlayers(n)} style={{
                flex:1,padding:'9px',borderRadius:8,border:'1px solid',fontWeight:700,fontSize:'.95rem',cursor:'pointer',
                borderColor:numPlayers===n?'#4a9e4a':'#2a2a2a',
                background:numPlayers===n?'rgba(74,158,74,.18)':'rgba(255,255,255,.04)',
                color:numPlayers===n?'#8be08b':'#666',
              }}>{n}</button>
            ))}
          </div>
        </div>

        <button onClick={createRoom} disabled={busy} style={{width:'100%',background:'#2d6a2d',color:'#fff',border:'none',borderRadius:8,padding:'12px',fontWeight:700,fontSize:'1rem',cursor:'pointer',marginBottom:14}}>
          Neues Spiel erstellen
        </button>
        <div style={{textAlign:'center',color:'#444',fontSize:'.75rem',marginBottom:14}}>oder</div>
        <div style={{display:'flex',gap:8}}>
          <input value={codeInput} onChange={e=>setCodeInput(e.target.value.toUpperCase())}
            placeholder="CODE" maxLength={4} onKeyDown={e=>e.key==='Enter'&&joinRoom()}
            style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid #333',borderRadius:8,padding:'11px 12px',color:'#f0ece0',fontSize:'1rem',letterSpacing:4,textTransform:'uppercase'}}
          />
          <button onClick={joinRoom} disabled={busy||!codeInput} style={{background:'rgba(255,255,255,.06)',color:'#aaa',border:'1px solid #333',borderRadius:8,padding:'11px 16px',fontWeight:600,fontSize:'.9rem',cursor:'pointer'}}>
            Beitreten
          </button>
        </div>
        {error&&<p style={{color:'#e55',marginTop:10,fontSize:'.82rem'}}>{error}</p>}
        <p style={{color:'#444',fontSize:'.7rem',marginTop:14}}>Angemeldet als {myName}</p>
      </div>
    </div>
  );
}

// ── WAITING ROOM ──────────────────────────────────────────────────────────────
function WaitingRoom({authUser, roomCode, mySeat, onGameStart, onLeave}) {
  const [st, setSt]           = useState(null);
  const [starting, setStarting] = useState(false);
  const isHost = mySeat === 0;

  useEffect(() => {
    const ref = roomRef(roomCode).child('stateJson');
    const cb  = snap => { if(snap.val()) setSt(JSON.parse(snap.val())); };
    ref.on('value', cb);
    return () => ref.off('value', cb);
  }, [roomCode]);

  useEffect(() => {
    if(!st||isHost) return;
    if(st.phase==='playing'||st.phase==='trick_result') onGameStart();
  }, [st?.phase]);

  const handleCancel = async () => {
    await roomRef(roomCode).remove();
    localStorage.removeItem('jass_room');
    onLeave();
  };

  const handleLeave = async () => {
    if(st){
      const newHuman = st.humanSeats.filter(s=>s!==mySeat);
      const newNames = [...st.seatNames];
      newNames[mySeat] = AI_NAMES[(mySeat-1+AI_NAMES.length)%AI_NAMES.length];
      await roomRef(roomCode).child(`players/${authUser.uid}`).remove();
      await writeState(roomCode, {...st, humanSeats:newHuman, seatNames:newNames});
    }
    localStorage.removeItem('jass_room');
    onLeave();
  };

  const start = async () => {
    if(!st) return;
    setStarting(true);
    await hostDeal(roomCode, 0, {totals:Array(st.numPlayers).fill(0),history:[],lastW:0}, st.humanSeats, st.seatNames, st.numPlayers);
    onGameStart();
  };

  const NP         = st?.numPlayers || 4;
  const seatNames  = st?.seatNames  || buildSeatNames(nameFromEmail(authUser.email), NP);
  const humanSeats = st?.humanSeats || [0];

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
      <div className="dark-panel" style={{padding:32,maxWidth:380,width:'100%'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
          <div>
            <div style={{fontSize:'.68rem',color:'#555',marginBottom:2}}>Raumcode</div>
            <div style={{fontSize:'2.2rem',fontWeight:900,letterSpacing:6,color:'#4a9e4a',lineHeight:1}}>{roomCode}</div>
          </div>
          <div style={{marginLeft:'auto',textAlign:'right'}}>
            <div style={{fontSize:'.65rem',color:'#555'}}>{NP} Spieler</div>
            <div style={{fontSize:'.65rem',color:'#444',marginTop:2}}>Teile den Code</div>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:20}}>
          {Array.from({length:NP},(_,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'rgba(255,255,255,.04)',borderRadius:8,border:i===mySeat?'1px solid #4a9e4a':'1px solid rgba(255,255,255,.05)'}}>
              <div style={{width:24,height:24,borderRadius:'50%',background:humanSeats.includes(i)?'#2d6a2d':'#1a1a1a',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.68rem',fontWeight:700,color:humanSeats.includes(i)?'#8be08b':'#444',flexShrink:0}}>{i+1}</div>
              <span style={{fontWeight:i===mySeat?700:400,color:humanSeats.includes(i)?'#eee':'#555',fontSize:'.88rem'}}>{seatNames[i]}</span>
              {i===mySeat&&<span style={{marginLeft:'auto',fontSize:'.62rem',color:'#4a9e4a'}}>Du</span>}
              {!humanSeats.includes(i)&&<span style={{marginLeft:'auto',fontSize:'.62rem',color:'#555'}}>KI</span>}
            </div>
          ))}
        </div>

        {isHost ? (
          <>
            <button onClick={start} disabled={starting} style={{width:'100%',background:'#2d6a2d',color:'#fff',border:'none',borderRadius:8,padding:'12px',fontWeight:700,fontSize:'1rem',cursor:'pointer',marginBottom:8}}>
              {starting?'Starte...':'Spiel starten →'}
            </button>
            <button onClick={handleCancel} style={{width:'100%',background:'transparent',color:'#c44',border:'1px solid #c44',borderRadius:8,padding:'9px',fontWeight:600,fontSize:'.88rem',cursor:'pointer'}}>
              Raum abbrechen
            </button>
          </>
        ) : (
          <>
            <p style={{textAlign:'center',color:'#555',fontSize:'.88rem',marginBottom:10}}>Warten auf Host...</p>
            <button onClick={handleLeave} style={{width:'100%',background:'transparent',color:'#c44',border:'1px solid #c44',borderRadius:8,padding:'9px',fontWeight:600,fontSize:'.88rem',cursor:'pointer'}}>
              Verlassen
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── JASS GAME ─────────────────────────────────────────────────────────────────
function JassGame({authUser, roomCode, mySeat, onLeave}) {
  const [G,      setG]      = useState(null);
  const [myHand, setMyHand] = useState([]);
  const Gref      = useRef(null);
  const tmr       = useRef(null);
  const aiRunning = useRef(false);
  const isHost    = mySeat === 0;

  useEffect(() => { Gref.current = G; }, [G]);

  useEffect(() => {
    const ref = roomRef(roomCode).child('stateJson');
    const cb  = snap => { if(snap.val()) setG(JSON.parse(snap.val())); };
    ref.on('value', cb);
    return () => ref.off('value', cb);
  }, [roomCode]);

  useEffect(() => {
    const ref = roomRef(roomCode).child(`handsJson/seat_${mySeat}`);
    const cb  = snap => { if(snap.val()) setMyHand(JSON.parse(snap.val())); };
    ref.on('value', cb);
    return () => ref.off('value', cb);
  }, [roomCode, mySeat]);

  useEffect(() => {
    if(!isHost||!G) return;
    clearTimeout(tmr.current);
    if(G.phase==='trick_result') {
      tmr.current = setTimeout(hostAdvance, 1500);
    } else if(G.phase==='playing' && !G.humanSeats.includes(G.cur)) {
      tmr.current = setTimeout(()=>hostRunAI(G.cur), 700);
    }
    return () => clearTimeout(tmr.current);
  }, [G?.phase, G?.cur, G?.tricksDone, isHost, G?.humanSeats?.length]);

  const hostRunAI = async seat => {
    if(aiRunning.current) return;
    aiRunning.current = true;
    try {
      const G = Gref.current;
      if(!G||G.phase!=='playing') return;
      const hand = await readHand(roomCode, seat);
      if(!hand.length) return;
      const cpp  = cppForN(G.numPlayers||4);
      const card = aiPlay(hand, G.trick, G.rndIdx, G.tricksDone, cpp);
      if(!card) return;
      await writeHand(roomCode, seat, hand.filter(c=>c.id!==card.id));
      await writeState(roomCode, computeCardPlay(G, seat, card));
    } finally { aiRunning.current = false; }
  };

  const hostAdvance = async () => {
    const G = Gref.current;
    if(!G) return;
    const cpp = cppForN(G.numPlayers||4);
    if(G.tricksDone >= cpp){
      const scores = calcScore(G.rndIdx, G.tricksWon, G.lastW, G.numPlayers||4);
      const totals = G.totals.map((t,i)=>t+scores[i]);
      await writeState(roomCode, {...G, phase:'round_result', history:[...G.history,scores], totals, rndRes:{rndIdx:G.rndIdx,scores}});
    } else {
      await writeState(roomCode, {...G, phase:'playing', trick:[], lead:G.lastW, cur:G.lastW, trickRes:null});
    }
  };

  const humanPlayCard = async card => {
    if(!G||G.phase!=='playing'||G.cur!==mySeat) return;
    if(G.trick.length>0){
      const ls=G.trick[0].card.suit;
      if(myHand.some(c=>c.suit===ls)&&card.suit!==ls) return;
    }
    await writeHand(roomCode, mySeat, myHand.filter(c=>c.id!==card.id));
    await writeState(roomCode, computeCardPlay(G, mySeat, card));
  };

  const hostNextRound = async () => {
    if(!G||!isHost) return;
    const n = G.rndIdx+1;
    if(n>=ROUNDS.length) {
      await writeState(roomCode, {...G, phase:'game_over'});
    } else {
      await hostDeal(roomCode, n, G, G.humanSeats, G.seatNames, G.numPlayers||4);
    }
  };

  const handleLeave = async () => {
    if(isHost && G) {
      await writeState(roomCode, {...G, phase:'game_over'});
    } else if(G) {
      const newHuman = G.humanSeats.filter(s=>s!==mySeat);
      const newNames = [...G.seatNames];
      newNames[mySeat] = AI_NAMES[(mySeat-1+AI_NAMES.length)%AI_NAMES.length];
      await roomRef(roomCode).child(`players/${authUser.uid}`).remove();
      await writeState(roomCode, {...G, humanSeats:newHuman, seatNames:newNames});
    }
    localStorage.removeItem('jass_room');
    onLeave();
  };

  if(!G) return <div style={{color:'#555',padding:40,textAlign:'center'}}>Lade...</div>;

  const NP       = G.numPlayers || 4;
  const CPP      = cppForN(NP);
  const rnd      = ROUNDS[G.rndIdx]||ROUNDS[0];
  const leadSuit = G.trick.length>0 ? G.trick[0].card.suit : null;
  const myTurn   = G.cur===mySeat && G.phase==='playing';
  const canPlay  = card => {
    if(!myTurn) return false;
    if(!leadSuit) return true;
    return myHand.some(c=>c.suit===leadSuit) ? card.suit===leadSuit : true;
  };
  const isLastTrick       = G.tricksDone===CPP-1 && G.phase==='playing';
  const isLastTrickResult = G.tricksDone===CPP    && G.phase==='trick_result';

  // Clockwise seat layout around table (offset from mySeat)
  const others     = Array.from({length:NP-1}, (_,i)=>(mySeat+1+i)%NP);
  const rightSeats = [others[0]];
  const leftSeats  = [others[NP-2]];
  const topSeats   = others.slice(1, NP-2).reverse(); // left-to-right display order

  // Card position on felt: ellipse, angles from bottom (270°) clockwise
  const feltCardPos = seat => {
    const off = ((seat-mySeat)+NP)%NP;
    const deg = (270 + off*360/NP) % 360;
    const rad = deg * Math.PI / 180;
    const rx  = NP>4 ? 30 : 34;
    const ry  = NP>4 ? 25 : 28;
    const cx  = 50 + rx*Math.cos(rad);
    const cy  = 50 - ry*Math.sin(rad);
    return {position:'absolute', left:`${cx}%`, top:`${cy}%`, transform:'translate(-50%,-50%)'};
  };

  const PlayerBadge = ({seat, orientation}) => {
    const active = G.cur===seat && G.phase==='playing';
    const count  = G.handSizes[seat];
    const vert   = orientation==='left'||orientation==='right';
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
        <div className={`player-badge${active?' active':''}`}
          style={vert ? {writingMode:'vertical-rl', transform:orientation==='left'?'rotate(180deg)':'none'} : {}}>
          {G.seatNames[seat]}{active?' 🤔':''}
        </div>
        <div style={{display:'flex',flexDirection:vert?'column':'row',gap:2,flexWrap:'wrap',justifyContent:'center',maxWidth:vert?undefined:180}}>
          {Array.from({length:count},(_,i)=><CardBack key={i} w={vert?11:13} h={vert?17:20}/>)}
        </div>
      </div>
    );
  };

  const isMobile = window.innerWidth < 640;

  // ── ROUND RESULT ──
  if(G.phase==='round_result'&&G.rndRes) {
    const next=G.rndIdx+1;
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
        <div className="fade-up dark-panel" style={{padding:32,maxWidth:420,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{fontSize:'2rem',marginBottom:8}}>{rnd.icon}</div>
            <h2 style={{fontSize:'1.4rem',marginBottom:4}}>Spiel {G.rndIdx+1}: {rnd.name}</h2>
            <p style={{color:'#666',fontSize:'.8rem'}}>{rnd.desc}</p>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',marginBottom:20}}>
            <thead><tr>
              {['Spieler','Punkte','Total'].map(h=>(
                <th key={h} style={{padding:'8px 10px',textAlign:h==='Spieler'?'left':'center',color:'#555',fontWeight:600,fontSize:'.78rem',borderBottom:'1px solid #222'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {G.seatNames.map((name,i)=>{
                const s=G.rndRes.scores[i];
                return (
                  <tr key={i} style={{background:i===mySeat?'rgba(74,158,74,.08)':''}}>
                    <td style={{padding:'9px 10px',fontWeight:i===mySeat?700:400}}>{name}{i===mySeat?' (Du)':''}</td>
                    <td style={{padding:'9px 10px',textAlign:'center',fontWeight:700,fontSize:'1.05rem',color:s>0?'#e55':s===0?'#555':'#4a9e4a'}}>{s>0?'+':''}{s}</td>
                    <td style={{padding:'9px 10px',textAlign:'center',color:'#777'}}>{G.totals[i]}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{display:'flex',gap:8}}>
            <button onClick={handleLeave} style={{background:'transparent',color:'#c44',border:'1px solid #c44',borderRadius:8,padding:'9px 14px',fontWeight:600,fontSize:'.82rem',cursor:'pointer',flexShrink:0}}>
              Verlassen
            </button>
            {isHost
              ? <button onClick={hostNextRound} style={{flex:1,background:'#2d6a2d',color:'#fff',border:'none',borderRadius:8,padding:'12px',fontWeight:700,fontSize:'.9rem',cursor:'pointer'}}>
                  {next<ROUNDS.length?`Weiter → ${ROUNDS[next].name}`:'Zum Endresultat →'}
                </button>
              : <p style={{flex:1,textAlign:'center',color:'#555',fontSize:'.88rem',paddingTop:14}}>Warten auf Host...</p>
            }
          </div>
        </div>
      </div>
    );
  }

  // ── GAME OVER ──
  if(G.phase==='game_over') {
    const sorted = G.seatNames.map((n,i)=>({n,i,s:G.totals[i]})).sort((a,b)=>a.s-b.s);
    const win = sorted[0];
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
        <div className="fade-up dark-panel" style={{padding:32,maxWidth:600,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:20}}>
            <div style={{fontSize:'2.5rem',marginBottom:8}}>🏆</div>
            <h2 style={{fontSize:'1.6rem',marginBottom:6}}>Endresultat</h2>
            <p style={{color:'#aaa'}}>{win.i===mySeat?'🎉 Du gewinnst!':win.n+' gewinnt!'} Am wenigsten Strafpunkte.</p>
          </div>
          <div style={{overflowX:'auto',marginBottom:20}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr>
                {['#','Spieler',...ROUNDS.map(r=>r.icon),'Total'].map((h,i)=>(
                  <th key={i} style={{padding:'8px 6px',textAlign:i<2?'left':'center',color:i===ROUNDS.length+2?'#e55':'#555',fontWeight:600,fontSize:'.75rem',borderBottom:'1px solid #222'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {sorted.map((p,rank)=>(
                  <tr key={p.i} style={{background:p.i===mySeat?'rgba(74,158,74,.08)':''}}>
                    <td style={{padding:'9px 6px',fontWeight:700,color:rank===0?'#4a9e4a':'#666'}}>{rank+1}.</td>
                    <td style={{padding:'9px 6px',fontWeight:p.i===mySeat?700:400}}>{p.n}</td>
                    {G.history.map((rs,ri2)=>(
                      <td key={ri2} style={{padding:'9px 4px',textAlign:'center',color:rs[p.i]>0?'#e55':rs[p.i]===0?'#444':'#4a9e4a',fontSize:'.82rem',fontWeight:600}}>
                        {rs[p.i]>0?'+':''}{rs[p.i]}
                      </td>
                    ))}
                    <td style={{padding:'9px 6px',textAlign:'center',fontWeight:700,fontSize:'1rem',color:rank===0?'#4a9e4a':'#e55'}}>{p.s}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:'flex',gap:8}}>
            {isHost&&<button onClick={()=>hostDeal(roomCode,0,{totals:Array(NP).fill(0),history:[],lastW:0},G.humanSeats,G.seatNames,NP)} style={{flex:1,background:'#2d6a2d',color:'#fff',border:'none',borderRadius:8,padding:'12px',fontWeight:700,cursor:'pointer'}}>
              Nochmals spielen
            </button>}
            <a href="index.html" onClick={()=>localStorage.removeItem('jass_room')} style={{flex:1,background:'rgba(255,255,255,.06)',color:'#aaa',border:'1px solid #2a2a2a',borderRadius:8,padding:'12px',fontWeight:600,textDecoration:'none',textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center'}}>
              ← Zurück
            </a>
          </div>
        </div>
      </div>
    );
  }

  // ── PLAYING / TRICK RESULT ──
  const cardH    = isMobile ? 108 : 128;
  const cardSize = isMobile ? 'md' : 'lg';

  return (
    <div className="jass-playing-screen" style={{display:'grid',gridTemplateRows:'auto 1fr auto',height:'100vh'}}>

      {/* Row 1: leave | top opponents | scoreboard */}
      <div style={{display:'flex',alignItems:'flex-start',gap:8}}>

        <button className="jass-leave-btn" onClick={handleLeave}>
          {isHost?'⬛ Ende':'← Weg'}
        </button>

        <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'flex-end',gap:isMobile?8:14,flexWrap:'wrap',paddingBottom:2}}>
          {topSeats.map(seat=><PlayerBadge key={seat} seat={seat} orientation="top"/>)}
        </div>

        {/* Glassmorphism scoreboard */}
        <div className="jass-score-panel" style={{flexShrink:0}}>
          <div style={{
            fontSize:'.54rem',color:'#C5A021',textTransform:'uppercase',
            letterSpacing:.8,marginBottom:5,fontWeight:700,
            borderBottom:'1px solid rgba(197,160,33,.15)',paddingBottom:4,
            display:'flex',alignItems:'center',gap:4
          }}>
            <span>{rnd.icon}</span>
            <span>{rnd.name}{(isLastTrick||isLastTrickResult)?' ⚡':''}</span>
          </div>
          {G.seatNames.map((name,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',gap:8,padding:'2px 0'}}>
              <span style={{fontSize:'.68rem',fontWeight:i===mySeat?700:400,color:i===mySeat?'#f0ece0':'rgba(240,236,224,.4)'}}>
                {i===mySeat?'Ich':name}
              </span>
              <span style={{fontSize:'.75rem',fontWeight:700,color:i===mySeat?'#C5A021':G.cur===i&&G.phase==='playing'?'rgba(139,224,139,.85)':'rgba(240,236,224,.25)'}}>
                {G.totals[i]}
              </span>
            </div>
          ))}
          <div style={{borderTop:'1px solid rgba(197,160,33,.1)',marginTop:4,paddingTop:3,fontSize:'.52rem',color:'rgba(197,160,33,.45)',textAlign:'right',letterSpacing:.5}}>
            {Math.min(G.tricksDone+1,CPP)}/{CPP} STICH
          </div>
        </div>
      </div>

      {/* Row 2: left | felt table | right */}
      <div style={{display:'flex',gap:isMobile?4:8,alignItems:'stretch',minHeight:0,overflow:'hidden'}}>

        {/* Left opponents */}
        <div style={{display:'flex',flexDirection:'column',justifyContent:'space-evenly',alignItems:'center',gap:6,flexShrink:0}}>
          {leftSeats.map(seat=><PlayerBadge key={seat} seat={seat} orientation="left"/>)}
        </div>

        {/* Green felt table */}
        <div style={{
          flex:1,position:'relative',
          background:'radial-gradient(ellipse at center, #1f6c1f 0%, #0d3d0d 100%)',
          borderRadius:isMobile?18:24,
          border:`${isMobile?3:4}px solid #081e08`,
          boxShadow:'inset 0 0 60px rgba(0,0,0,.5), 0 6px 28px rgba(0,0,0,.4)',
          overflow:'hidden',
          maxWidth:isMobile?undefined:480,
          margin:isMobile?undefined:'0 auto',
          alignSelf:'stretch',
        }}>
          <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(45deg,rgba(0,0,0,.018) 0,rgba(0,0,0,.018) 1px,transparent 1px,transparent 5px)',pointerEvents:'none'}}/>

          {Array.from({length:NP},(_,off)=>{
            const fakeSeat=(mySeat+off)%NP;
            if(G.trick.some(t=>t.player===fakeSeat)) return null;
            const pos=feltCardPos(fakeSeat);
            return <div key={off} style={{...pos,width:60,height:92,border:'1px dashed rgba(255,255,255,.07)',borderRadius:8}}/>;
          })}

          {G.trick.map(({player,card})=>{
            const winner=G.phase==='trick_result'&&G.trickRes?.w===player;
            return (
              <div key={player} style={feltCardPos(player)}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:'.5rem',color:'rgba(255,255,255,.35)',marginBottom:3,whiteSpace:'nowrap'}}>{G.seatNames[player]}</div>
                  <div className={winner?'win-glow':''} style={{filter:winner?'drop-shadow(0 0 12px rgba(100,230,100,.8))':'none'}}>
                    <CardView card={card} size="md" special/>
                  </div>
                  {winner&&<div style={{fontSize:'.54rem',color:'#8be08b',fontWeight:700,marginTop:2,textAlign:'center'}}>✓</div>}
                </div>
              </div>
            );
          })}

          {G.phase==='trick_result'&&G.trickRes&&(
            <div className="fade-up" style={{position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.78)',backdropFilter:'blur(6px)',border:'1px solid rgba(139,224,139,.2)',borderRadius:8,padding:'5px 16px',whiteSpace:'nowrap',fontSize:'.75rem',color:'#8be08b',fontWeight:700}}>
              {G.seatNames[G.trickRes.w]} gewinnt den Stich
            </div>
          )}
        </div>

        {/* Right opponents */}
        <div style={{display:'flex',flexDirection:'column',justifyContent:'space-evenly',alignItems:'center',gap:6,flexShrink:0}}>
          {rightSeats.map(seat=><PlayerBadge key={seat} seat={seat} orientation="right"/>)}
        </div>
      </div>

      {/* Row 3: fanned hand */}
      <div className="jass-hand-panel">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:'.62rem',fontWeight:700,textTransform:'uppercase',letterSpacing:.5,color:myTurn?'#C5A021':'rgba(240,236,224,.3)'}}>
            {myTurn?'→ Du bist dran':G.phase==='playing'?`${G.seatNames[G.cur]} ist dran…`:''}
          </span>
          {leadSuit&&(
            <span style={{fontSize:'.65rem',background:'rgba(197,160,33,.1)',border:'1px solid rgba(197,160,33,.25)',borderRadius:10,padding:'2px 9px',color:'#C5A021',fontWeight:600}}>
              {SUIT_EMOJI[leadSuit]} {leadSuit}
            </span>
          )}
        </div>

        {/* Fan */}
        <div style={{position:'relative',height:cardH,display:'flex',justifyContent:'center'}}>
          {myHand.map((card,idx)=>{
            const total  = myHand.length;
            const center = (total-1)/2;
            const rel    = idx-center;
            const gap    = total>8?20:total>6?24:total>4?28:34;
            const rot    = rel*(total>8?2.5:total>6?3.2:total>4?4:5.5);
            const ok     = canPlay(card);
            const isEO   = card.suit==='Eichel'&&card.rank==='O';
            return (
              <div key={card.id}
                style={{position:'absolute',bottom:0,left:`calc(50% + ${rel*gap}px - ${isMobile?30:37}px)`,transform:`rotate(${rot}deg)`,transformOrigin:'bottom center',zIndex:idx}}>
                <div className={ok?'card-lift'+(isEO?' card-special':''):'card-dim'} onClick={()=>ok&&humanPlayCard(card)}>
                  <CardView card={card} size={cardSize} special={isEO}/>
                </div>
              </div>
            );
          })}
        </div>

        {myTurn&&leadSuit&&(
          <div style={{marginTop:4,fontSize:'.6rem',color:'rgba(255,255,255,.28)',textAlign:'center'}}>
            Farbzwang: {leadSuit} spielen (wenn vorhanden)
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [authUser, setAuthUser] = useState(null);
  const [screen,   setScreen]   = useState('loading');
  const [roomCode, setRoomCode] = useState('');
  const [mySeat,   setMySeat]   = useState(-1);

  useEffect(() => {
    const ALLOWED = ['eichleober@gmail.com','ella.baettig@gmail.com','noe.bertallo@icloud.com',
      'lars.lumer@icloud.com','cpfenninger@outlook.com','le.nievergelt@gmail.com','silas.mueller4@gmail.com'];

    return firebase.auth().onAuthStateChanged(async user => {
      if(!user) { setScreen('login'); return; }
      if(!ALLOWED.includes(user.email.toLowerCase())) {
        firebase.auth().signOut();
        setScreen('login');
        return;
      }
      setAuthUser(user);
      const saved = localStorage.getItem('jass_room');
      if(saved){
        const pSnap = await roomRef(saved).child(`players/${user.uid}`).once('value');
        if(pSnap.exists()){
          const seat  = pSnap.val().seat;
          const sSnap = await roomRef(saved).child('stateJson').once('value');
          const st    = sSnap.val() ? JSON.parse(sSnap.val()) : null;
          if(st && st.phase!=='game_over'){
            setRoomCode(saved); setMySeat(seat);
            setScreen(['playing','trick_result','round_result'].includes(st.phase)?'game':'waiting');
            return;
          }
        }
        localStorage.removeItem('jass_room');
      }
      setScreen('lobby');
    });
  }, []);

  const goLobby = () => { setScreen('lobby'); setRoomCode(''); setMySeat(-1); };

  if(screen==='loading') return <div style={{color:'#555',padding:40,textAlign:'center'}}>Laden...</div>;
  if(screen==='login') return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
      <div style={{background:'rgba(12,9,3,.82)',border:'1px solid rgba(255,255,255,.1)',borderRadius:16,padding:'40px 32px',maxWidth:340,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:'2.4rem',marginBottom:8}}>🃏</div>
        <div style={{fontSize:'1.4rem',fontWeight:800,color:'#f0ece0',marginBottom:6,letterSpacing:1}}>Guggitaler Jass</div>
        <div style={{fontSize:'.82rem',color:'rgba(240,236,224,.45)',marginBottom:32}}>Kein Trumpf · Farbzwang · Wer am wenigsten Punkte hat, gewinnt</div>
        <button
          onClick={() => firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())}
          style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:12,background:'#fff',color:'#1a1201',border:'none',borderRadius:8,padding:'13px 16px',fontWeight:700,fontSize:'.95rem',cursor:'pointer',marginBottom:12}}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.9 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-21 0-1.3-.2-2.7-.5-4z"/></svg>
          Mit Google anmelden
        </button>
        <a href="index.html" style={{display:'block',fontSize:'.75rem',color:'rgba(240,236,224,.3)',textDecoration:'none',marginTop:8}}>← Zurück zur Vereinsseite</a>
      </div>
    </div>
  );
  if(screen==='lobby')   return <Lobby authUser={authUser} onJoined={(c,s)=>{setRoomCode(c);setMySeat(s);setScreen('waiting');}}/>;
  if(screen==='waiting') return <WaitingRoom authUser={authUser} roomCode={roomCode} mySeat={mySeat} onGameStart={()=>setScreen('game')} onLeave={goLobby}/>;
  if(screen==='game')    return <JassGame authUser={authUser} roomCode={roomCode} mySeat={mySeat} onLeave={goLobby}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
